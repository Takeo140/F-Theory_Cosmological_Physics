name: F-Theory Cosmology CI + Auto Merge

on:
  push:
    branches: [ main ]  # メインブランチの履歴に ✅ を表示させる
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize]

# 権限設定：マージとステータス読み取りを許可
permissions:
  contents: write
  pull-requests: write
  statuses: read

jobs:
  build:
    name: Lean + mathlib Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Setup Lean and Lakefile
        run: |
          elan default leanprover/lean4:stable
          
          # lakefile.leanが存在しない場合のみ作成（既存の設定を壊さないため）
          if [ ! -f lakefile.lean ]; then
            cat << EOF > lakefile.lean
          import Lake
          open Lake DSL
          package cosmology
          require mathlib from git "https://github.com/leanprover-community/mathlib4"
          lean_lib Cosmology
          EOF
          fi
          
          lake update

      - name: Get Mathlib Cache
        run: |
          # 物理モデルの検証に必要なMathlibのキャッシュを高速取得
          lake exe cache get || true

      - name: Build
        run: lake build

  auto-merge:
    name: Auto Merge if CI Green
    needs: build
    # PR時のみ実行し、メインへのPush時はスキップ（エラー防止）
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Auto Merge
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                merge_method: "squash"
              });
              console.log("Auto-merged successfully.");
            } catch (e) {
              console.log("Merge failed (likely branch protection or conflict):", e);
            }
