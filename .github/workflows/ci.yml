name: F-Theory Cosmology CI + Auto Merge

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize]

# マージを実行するために必要な書き込み権限を明示
permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Lean + mathlib Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Setup Lean and Lakefile
        run: |
          elan default leanprover/lean4:stable
          
          # 宇宙の「表（現象）」を記述するためのパッケージ構成
          cat << EOF > lakefile.lean
          import Lake
          open Lake DSL
          package cosmology
          require mathlib from git "https://github.com/leanprover-community/mathlib4"
          lean_lib Cosmology
          EOF

      - name: Get Mathlib Cache
        run: |
          # 物理モデルの検証に必要なMathlibのキャッシュを高速取得
          lake exe cache get || true

      - name: Build
        run: lake build

  auto-merge:
    name: Auto Merge if CI Green
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Auto Merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            // buildジョブが完了している＝極値原理と論理一貫性が証明されたとみなす
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: "squash"
            });
